<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Main branch vertical line -->
  <line x1="4" y1="5" x2="4" y2="11" stroke="#4E9CD0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Branch curve from main to feature branch -->
  <path d="M 4 10 C 4 7 12 7 12 5" stroke="#4E9CD0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Bottom commit node -->
  <circle cx="4" cy="13" r="2" fill="#4E9CD0"/>
  <!-- Top main commit node -->
  <circle cx="4" cy="3" r="2" fill="#4E9CD0"/>
  <!-- Feature branch commit node -->
  <circle cx="12" cy="3" r="2" fill="#98C379"/>
</svg>
