name: Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: msbuild GitBranchStats\GitBranchStats.csproj -t:Restore -p:Configuration=Release -v:minimal

      - name: Build VSIX
        run: msbuild GitBranchStats\GitBranchStats.csproj -t:Rebuild -p:Configuration=Release -p:DeployExtension=false -v:minimal

      - name: Upload VSIX as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitBranchStats-vsix
          path: GitBranchStats/bin/Release/GitBranchStats.vsix

      # Attaches the VSIX to the release. Triggered either by publishing a release in
      # the GitHub UI, or by pushing a tag like v1.0.0 (which creates the release).
      - name: Publish VSIX to the release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GitBranchStats/bin/Release/GitBranchStats.vsix
